# .github/workflows/keepalive.yml
name: Keep Render Alive

on:
  schedule:
    - cron: "*/3 * * * *"   # every 3 minutes
  workflow_dispatch:  # manual trigger too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render apps
        run: |
            curl -o /dev/null -w "%{url_effective} — %{http_code}\n" https://stockbridge-m2zc.onrender.com/api/docs
            curl -o /dev/null -w "%{url_effective} — %{http_code}\n" https://mindybrows.onrender.com/
            curl -o /dev/null -w "%{url_effective} — %{http_code}\n" https://blocksigma-vyk5.onrender.com/
            curl -o /dev/null -w "%{url_effective} — %{http_code}\n" https://techscape-9akf.onrender.com/
